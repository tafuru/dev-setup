name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck setup.sh

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        mode: [repos, curl]
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.actor }}
      CHEZMOI_GIT_NAME: CI
      CHEZMOI_GIT_EMAIL: ci@example.com
      CI: "true"

    steps:
      - uses: actions/checkout@v4
        if: matrix.mode == 'repos'

      - name: Run setup.sh (repos mode)
        if: matrix.mode == 'repos'
        run: bash setup.sh --repos

      - name: Run setup.sh (curl mode)
        if: matrix.mode == 'curl'
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/tafuru/dev-setup/${BRANCH}/setup.sh)"

      - name: Add ~/.local/bin to PATH
        if: runner.os == 'Linux'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify CLI tools
        run: |
          command -v chezmoi
          command -v git
          command -v fzf
          command -v nvim

      - name: Verify dotfiles applied
        run: |
          chezmoi source-path
          test -f "$HOME/.gitconfig"

      - name: Verify runtimes installed
        run: |
          mise list rust | grep -q "rust"
