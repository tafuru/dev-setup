name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck setup.sh

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        mode: [repos, curl]
    env:
      CHEZMOI_GIT_NAME: CI
      CHEZMOI_GIT_EMAIL: ci@example.com
      CI: "true"

    steps:
      - uses: actions/checkout@v4
        if: matrix.mode == 'repos'

      - name: Run setup.sh (repos mode)
        if: matrix.mode == 'repos'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: bash setup.sh --repos

      - name: Run setup.sh (curl mode)
        if: matrix.mode == 'curl'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            BRANCH="${{ github.head_ref || github.ref_name }}"
            bash -c "$(curl -fsSL https://raw.githubusercontent.com/tafuru/dev-setup/${BRANCH}/setup.sh)"

      - name: Add ~/.local/bin to PATH
        if: runner.os == 'Linux'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify CLI tools
        run: |
          command -v chezmoi
          command -v git
          command -v fzf
          command -v nvim

      - name: Verify dotfiles applied
        run: |
          chezmoi source-path
          test -f "$HOME/.gitconfig"

      - name: Verify runtimes installed
        run: |
          grep -E '^\w+ =' "$HOME/.config/mise/config.toml" | cut -d= -f1 | tr -d ' ' | while read -r tool; do
            mise list "$tool" | grep -q "$tool" || (echo "Missing runtime: $tool" && exit 1)
          done
