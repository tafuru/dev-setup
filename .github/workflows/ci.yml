name: CI

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [upstream-changed]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck setup.sh

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        mode: [repos, curl]
    env:
      CHEZMOI_GIT_NAME: CI
      CHEZMOI_GIT_EMAIL: ci@example.com
      CI: "true"

    steps:
      - uses: actions/checkout@v4
        if: matrix.mode == 'repos'

      - name: Run setup.sh (repos mode)
        if: matrix.mode == 'repos'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 5
          command: bash setup.sh --repos

      - name: Run setup.sh (curl mode)
        if: matrix.mode == 'curl'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 5
          command: |
            BRANCH="${{ github.head_ref || github.ref_name }}"
            bash -c "$(curl -fsSL https://raw.githubusercontent.com/tafuru/dev-setup/${BRANCH}/setup.sh)"

      - name: Add Linuxbrew to PATH
        if: runner.os == 'Linux'
        run: |
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Verify CLI tools
        run: |
          command -v chezmoi
          command -v git
          command -v fzf
          command -v nvim

      - name: Verify dotfiles applied
        run: |
          chezmoi source-path
          test -f "$HOME/.gitconfig"

      - name: Verify runtimes installed
        run: |
          grep -E '^\w+ =' "$HOME/.config/mise/config.toml" | cut -d= -f1 | tr -d ' ' | while read -r tool; do
            mise list "$tool" | grep -q "$tool" || (echo "Missing runtime: $tool" && exit 1)
          done

      - name: Verify Neovim plugins installed
        run: |
          test -d "$HOME/.local/share/nvim/lazy/lazy.nvim"
          missing=0
          while IFS= read -r plugin; do
            if ! test -d "$HOME/.local/share/nvim/lazy/$plugin"; then
              echo "MISSING plugin: $plugin"
              missing=1
            fi
          done < <(
            grep -roh "[A-Za-z0-9_-]*/[A-Za-z0-9._-]*" \
              "$HOME/.config/nvim/lua/plugins/" 2>/dev/null \
              | sed 's|.*/||' | sort -u
          )
          exit $missing

      - name: Verify Neovim starts without errors
        run: |
          output=$(nvim --headless -c 'qa' 2>&1 || true)
          if echo "$output" | grep -qE 'stack traceback|Error in config|Unexpected field'; then
            echo "Neovim startup errors detected:"
            echo "$output"
            exit 1
          fi

  test-devtools-flag:
    runs-on: ubuntu-latest
    env:
      CHEZMOI_GIT_NAME: CI
      CHEZMOI_GIT_EMAIL: ci@example.com
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Create mock devtools script
        run: |
          printf '#!/usr/bin/env bash\ntouch /tmp/devtools_called\n' > /tmp/mock-devtools.sh
          chmod +x /tmp/mock-devtools.sh

      - name: Run setup.sh --devtools (with mock)
        uses: nick-fields/retry@v3
        env:
          DEVTOOLS_SCRIPT: /tmp/mock-devtools.sh
        with:
          timeout_minutes: 60
          max_attempts: 5
          command: bash setup.sh --repos --devtools

      - name: Verify devtools was called
        run: test -f /tmp/devtools_called
